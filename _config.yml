# Site Info
title:              "Giacomo Zanatta"
description:        "Giacomo Zanatta"
#google_verify:      abc123 # Put your Google Verification here
#google_analytics:   

# Author Info
author_name:        "Giacomo Zanatta" # Your name here
author_email:       giacomo.zanatta@unive.it # Your email here
#author_gravatar:    e98e5de03e97f8498caab87e85a43f9a # Your Gravatar md5 hash here for logo

# Site Settings
url:                 https://www.giacomozanatta.com # Change to your site
baseurl:
permalink:          /posts/:title # Post permalink
timezone:           Europe/Rome # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
mathjax:            true  # enables support for mathjax - set to false to disable

# Site Build
highlighter:        rouge
markdown:           kramdown
kramdown:
    input:          GFM
sass:
    style:          :compressed

# Other Params
include:            [ "robots.txt" ]
exclude:            [ "LICENSE", "README.md", "CNAME", "vendor", "Gemfile" ]
plugins:
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/blog/page:num/"

defaults:
  -
    scope:
      path:         ""
    values:
      layout:       "null"
  -
    scope:
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      type:         "posts"
    values:
      layout:       "post"
